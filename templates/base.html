<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">{{ site_title }}</a>
      <nav class="site-nav">
        <a href="index.html" {% if active == 'index' %}class="active"{% endif %}>Themes</a>
        <a href="feed.html"  {% if active == 'feed'  %}class="active"{% endif %}>Feed</a>
      </nav>
      <div class="header-meta">
        <span class="updated-at">Updated {{ now | datefmt("%d %b %H:%M") }}</span>
        {% if latest_audio_exists %}
        <a href="audio/latest.ogg" download="newsfeed-latest.ogg" class="download-link" title="Download all audio from this update">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v4h5.66V9h3.84L12 2z" transform="scale(1,-1) translate(0,-24)"/><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download latest
        </a>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Personal newsfeed · auto-updated hourly</p>
  </footer>

  <script src="script.js" type="module"></script>
</body>
</html>
