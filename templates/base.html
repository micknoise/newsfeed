<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">{{ site_title }}</a>
      <nav class="site-nav">
        <a href="index.html" {% if active == 'index' %}class="active"{% endif %}>Themes</a>
        <a href="feed.html"  {% if active == 'feed'  %}class="active"{% endif %}>Feed</a>
      </nav>
      <div class="header-meta">
        <span class="updated-at">Updated {{ now | datefmt("%d %b %H:%M") }}</span>
      </div>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Personal newsfeed · auto-updated hourly</p>
  </footer>

  <script src="script.js" type="module"></script>
</body>
</html>
